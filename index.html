import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const CYAN = 0x4de3ff, AMBER = 0xf0a63c;
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070c);
scene.fog = new THREE.FogExp2(0x05070c, 0.05);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 100);
const CAM_TO = new THREE.Vector3(2.4, 1.9, 4.2);
camera.position.set(7, 5, 9);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.enabled = false;
controls.minDistance = 3; controls.maxDistance = 12;
controls.maxPolarAngle = Math.PI * 0.53;
controls.target.set(0, 1.1, 0);

// bloom postprocessing — only bright emissive things glow
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.75, 0.55, 0.82);
composer.addPass(bloom);

// ---- lighting ----
scene.add(new THREE.AmbientLight(0x1a2430, 0.8));
const key = new THREE.DirectionalLight(0xbcd6ff, 0.9);
key.position.set(5, 8, 4); key.castShadow = true;
key.shadow.mapSize.set(2048,2048); key.shadow.radius = 8; scene.add(key);
const rim = new THREE.SpotLight(AMBER, 30, 20, Math.PI/6, 0.8, 1.5);
rim.position.set(-6, 4, -5); scene.add(rim);
const under = new THREE.PointLight(CYAN, 0.0, 5); under.position.set(0, 0.35, 0); scene.add(under);

// ---- floor + grid ----
const floor = new THREE.Mesh(new THREE.CircleGeometry(22, 64),
  new THREE.MeshStandardMaterial({ color:0x080b11, roughness:0.7, metalness:0.25 }));
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
const grid = new THREE.GridHelper(40, 80, 0x14202c, 0x0c141c); scene.add(grid);

// ============================================================ UM890 mini-PC
const pc = new THREE.Group(); scene.add(pc);
const shell = new THREE.MeshStandardMaterial({ color:0x15181e, roughness:0.4, metalness:0.8 });
const dark  = new THREE.MeshStandardMaterial({ color:0x0a0c10, roughness:0.5, metalness:0.6 });
function box(w,h,d,mat,x,y,z,g){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; (g||pc).add(m); return m; }

box(1.9, 0.66, 1.9, shell, 0, 0.55, 0);          // body (wide flat mini-PC)
box(1.7, 0.03, 1.7, dark, 0, 0.885, 0);          // top plate inset
// top vent grooves
const ventMat = new THREE.MeshStandardMaterial({ color:0x05070a, roughness:0.7 });
for(let i=-3;i<=3;i++) box(1.4, 0.02, 0.05, ventMat, 0, 0.9, i*0.14);
// front panel details
box(1.75, 0.42, 0.02, dark, 0, 0.5, 0.955);      // front face
// USB / port insets
for(let i=0;i<3;i++) box(0.12, 0.06, 0.02, ventMat, -0.5+i*0.22, 0.42, 0.966);
// glowing accent strip along the base (blooms)
const accentMat = new THREE.MeshStandardMaterial({ color:CYAN, emissive:CYAN, emissiveIntensity:1.2 });
box(1.92, 0.015, 0.02, accentMat, 0, 0.24, 0.955);
box(0.02, 0.015, 1.92, accentMat, 0.955, 0.24, 0);
box(0.02, 0.015, 1.92, accentMat, -0.955, 0.24, 0);
// rubber feet
for(const [fx,fz] of [[0.8,0.8],[-0.8,0.8],[0.8,-0.8],[-0.8,-0.8]])
  box(0.16, 0.04, 0.16, dark, fx, 0.02, fz);
// soft glow decal on the floor under the box
const decal = new THREE.Mesh(new THREE.CircleGeometry(2.4, 48),
  new THREE.MeshBasicMaterial({ color:CYAN, transparent:true, opacity:0.05, depthWrite:false }));
decal.rotation.x = -Math.PI/2; decal.position.y = 0.005; scene.add(decal);
// power button (interactive)
const powerMat = new THREE.MeshStandardMaterial({ color:CYAN, emissive:CYAN, emissiveIntensity:0.4, roughness:0.3 });
const power = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.03,24), powerMat);
power.rotation.x = Math.PI/2; power.position.set(0.62, 0.6, 0.965); pc.add(power);
// activity LEDs
const leds = [];
for(let i=0;i<3;i++){
  const m = new THREE.MeshStandardMaterial({ color:0x113322, emissive:0x1e7a3f, emissiveIntensity:0.6 });
  const l = new THREE.Mesh(new THREE.CircleGeometry(0.022,16), m);
  l.position.set(0.35+i*0.09, 0.6, 0.966); pc.add(l); leds.push(m);
}
// brand text on top
const bc = document.createElement('canvas'); bc.width=512; bc.height=64;
const bx = bc.getContext('2d'); bx.fillStyle='#3a4656'; bx.font='bold 34px ui-monospace,monospace';
bx.fillText('UM890 PRO  ·  henry.home', 10, 46);
const brand = new THREE.Mesh(new THREE.PlaneGeometry(1.5,0.19),
  new THREE.MeshBasicMaterial({ map:new THREE.CanvasTexture(bc), transparent:true, opacity:0.5 }));
brand.rotation.x = -Math.PI/2; brand.position.set(0,0.902,0.55); pc.add(brand);

// ============================================================ Tailscale mesh (devices -> home server)
const mesh = new THREE.Group(); scene.add(mesh);
const NODES = 6, nodePts = [], pulses = [];
const lineMat = new THREE.LineBasicMaterial({ color:CYAN, transparent:true, opacity:0.16 });
const nodeMat = new THREE.MeshBasicMaterial({ color:CYAN });
for(let i=0;i<NODES;i++){
  const a = (i/NODES)*Math.PI*2, r = 3.4 + (i%2)*0.7;
  const p = new THREE.Vector3(Math.cos(a)*r, 1.1 + Math.sin(i*1.7)*1.0, Math.sin(a)*r);
  nodePts.push(p);
  const n = new THREE.Mesh(new THREE.SphereGeometry(0.05,12,12), nodeMat);
  n.position.copy(p); mesh.add(n);
  const geo = new THREE.BufferGeometry().setFromPoints([p, new THREE.Vector3(0,0.9,0)]);
  mesh.add(new THREE.Line(geo, lineMat));
  const pulse = new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),
    new THREE.MeshBasicMaterial({ color:0xffffff }));
  pulse.userData = { from:p.clone(), to:new THREE.Vector3(0,0.9,0), t:Math.random(), spd:0.004+Math.random()*0.006 };
  mesh.add(pulse); pulses.push(pulse);
}
mesh.visible = false; // appears on boot

// ============================================================ rising ambient particles
const PN = 260, pgeo = new THREE.BufferGeometry(), ppos = new Float32Array(PN*3), pspd = [];
for(let i=0;i<PN;i++){
  ppos[i*3]=(Math.random()-0.5)*8; ppos[i*3+1]=Math.random()*6; ppos[i*3+2]=(Math.random()-0.5)*8;
  pspd.push(0.002+Math.random()*0.006);
}
pgeo.setAttribute('position', new THREE.BufferAttribute(ppos,3));
const particles = new THREE.Points(pgeo,
  new THREE.PointsMaterial({ color:CYAN, size:0.03, transparent:true, opacity:0.4 }));
scene.add(particles);

// ============================================================ holographic terminal panel
const scrCanvas = document.createElement('canvas'); scrCanvas.width=860; scrCanvas.height=560;
const ctx = scrCanvas.getContext('2d');
const scrTex = new THREE.CanvasTexture(scrCanvas); scrTex.colorSpace = THREE.SRGBColorSpace;
const holo = new THREE.Group(); scene.add(holo);
const panel = new THREE.Mesh(new THREE.PlaneGeometry(2.6, 1.7),
  new THREE.MeshBasicMaterial({ map:scrTex, transparent:true, opacity:0.0, depthWrite:false }));
panel.position.set(0, 2.55, 0); panel.rotation.x = -0.08; holo.add(panel);
// projection beam (box -> panel)
const beamMat = new THREE.MeshBasicMaterial({ color:CYAN, transparent:true, opacity:0.0, side:THREE.DoubleSide, depthWrite:false });
const beam = new THREE.Mesh(new THREE.ConeGeometry(1.5, 1.7, 4, 1, true), beamMat);
beam.position.set(0, 1.7, 0); beam.rotation.y = Math.PI/4; holo.add(beam);

// ---- terminal engine ----
const PROMPT = 'henry@home:~$ ';
const C = { cyan:'#7ff0ff', dim:'#3f7f8f', amber:'#f0a63c', white:'#dff3fb', ok:'#4dff9a' };
let history = [], input = '', booted = false, accepting = false, cursorOn = true;
let cmdHist = [], histIdx = 0;
let typeQ = [], typing = null, typedN = 0, flash = 0;   // boot typewriter + screen flash
const LH = 24, PAD_X = 34, PAD_TOP = 40, MAX_ROWS = 19;
function print(t='', c=C.cyan){ t.split('\n').forEach(l=>history.push({t:l,c})); }
setInterval(()=>cursorOn=!cursorOn, 480);

function drawScreen(){
  ctx.clearRect(0,0,860,560);
  // holo backdrop
  ctx.fillStyle = 'rgba(6,20,28,0.82)'; ctx.fillRect(0,0,860,560);
  // header bar
  ctx.fillStyle = 'rgba(77,227,255,0.10)'; ctx.fillRect(0,0,860,34);
  ctx.fillStyle = C.amber; ctx.font = '16px ui-monospace, monospace'; ctx.textBaseline='middle';
  ctx.fillText('● henry.home — home lab // 24/7', 16, 18);
  // body
  ctx.textBaseline = 'top'; ctx.font = '17px ui-monospace, monospace';
  const rows = [...history];
  if(typing) rows.push({ t: typing.t.slice(0, Math.floor(typedN)) + '▋', c: typing.c });
  if(accepting) rows.push({ t: PROMPT + input + (cursorOn?'█':' '), c:C.cyan });
  rows.slice(-MAX_ROWS).forEach((r,i)=>{ ctx.fillStyle=r.c; ctx.fillText(r.t, PAD_X, PAD_TOP+i*LH); });
  // scanlines + glow border
  ctx.fillStyle='rgba(0,0,0,0.10)'; for(let y=34;y<560;y+=3) ctx.fillRect(0,y,860,1);
  ctx.strokeStyle='rgba(77,227,255,0.5)'; ctx.lineWidth=3; ctx.strokeRect(2,2,856,556);
  if(flash>0){ ctx.fillStyle='rgba(200,245,255,'+(flash*0.7)+')'; ctx.fillRect(0,0,860,560); }
  scrTex.needsUpdate = true;
}

    print('  scalp        a live scalping desk        → open scalp', C.cyan);
    print('  stock-sentry a telegram trading agent    (soon · desensitizing)', C.dim);
    print('  menu         the visual grid of everything', C.dim);
    print('  the portfolio (my day job & case studies) → open portfolio', C.dim); },
  open(a){ const map={ scalp:'showcase-scalp.html', menu:'lab.html',
      lab:'lab.html', portfolio:'../portfolio-website/index.html' };
    const u=map[(a||'').toLowerCase()];
    if(!u){ print('open what? try: showcases', C.dim); return; }
    print('opening '+a+' …', C.ok); setTimeout(()=>{ location.href=u; }, 450); },
  menu(){ print('opening the visual grid …', C.ok); setTimeout(()=>{ location.href='lab.html'; }, 450); },
  clear(){ history = []; },
};
function run(raw){ const line = raw.trim(); print(PROMPT + line, C.cyan);
  if(!line) return; cmdHist.push(line); histIdx = cmdHist.length;
  const [cmd,...r] = line.split(/\s+/);
  const fn = CMDS[cmd]; if(fn) fn(r.join(' '));
  else { print('command not found: '+cmd, C.amber); print('type: help', C.dim); } }

// ---- boot ----
const BOOT = [
  { t:'UM890 PRO — power on', c:C.dim },
  { t:'WSL2 Ubuntu ... ok', c:C.dim },
  { t:'[ OK ] hermes-agent      up', c:C.ok },
  { t:'[ OK ] fastapi-trading   up', c:C.ok },
  { t:'[ OK ] tailscale mesh    0 open ports', c:C.ok },
  { t:'', c:C.cyan },
  { t:"you're inside henry.home — the home lab.", c:C.amber },
  { t:'type  help  to look around.', c:C.amber },
  { t:'', c:C.cyan },
];
function boot(){
  if(booted) return; booted = true;
  document.getElementById('hint').classList.add('gone');
  powerMat.emissiveIntensity = 2.4; mesh.visible = true;
  flash = 1;                       // screen power-on flash
  typeQ = BOOT.slice();            // typed char-by-char in the render loop
  bootSound();
}
// soft two-tone power-on chime (synth, no assets). user gesture unlocks audio.
let actx;
function bootSound(){
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const now = actx.currentTime;
    [[330, 0], [494, 0.12], [659, 0.24]].forEach(([f, t]) => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, now + t);
      g.gain.exponentialRampToValueAtTime(0.06, now + t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.18);
      o.connect(g).connect(actx.destination); o.start(now + t); o.stop(now + t + 0.2);
    });
  } catch (e) { /* audio blocked — silent is fine */ }
}

// ---- input ----
addEventListener('keydown', e=>{
  if(!booted){ boot(); return; }
  if(!accepting) return;
  if(e.key==='Enter'){ run(input); input=''; e.preventDefault(); }
  else if(e.key==='Backspace'){ input=input.slice(0,-1); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ if(cmdHist.length){ histIdx=Math.max(0,histIdx-1); input=cmdHist[histIdx]; } e.preventDefault(); }
  else if(e.key==='ArrowDown'){ histIdx=Math.min(cmdHist.length,histIdx+1); input=cmdHist[histIdx]||''; e.preventDefault(); }
  else if(e.key==='Tab'){ const s=input.trim();
    const m=Object.keys(CMDS).filter(k=>k.startsWith(s));
    if(s && m.length===1) input=m[0];
    else if(m.length>1){ print(PROMPT+input, C.cyan); print(m.join('   '), C.dim); }
    e.preventDefault(); }
  else if(e.key.length===1 && !e.metaKey && !e.ctrlKey){ input+=e.key; e.preventDefault(); }
});
let downXY=null;
renderer.domElement.addEventListener('pointerdown', e=>downXY=[e.clientX,e.clientY]);
renderer.domElement.addEventListener('pointerup', e=>{
  const moved = downXY?Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]):99;
  downXY=null; if(moved<6 && !booted) boot();
});
setTimeout(()=>document.getElementById('hint').classList.add('show'), 1300);

// ============================================================ render loop
let intro = 0, glow = 0;
function tick(){
  requestAnimationFrame(tick);
  const now = performance.now();

  if(intro < 1){ intro = Math.min(1, intro+0.008);
    const e = 1-Math.pow(1-intro,3);
    camera.position.lerpVectors(new THREE.Vector3(7,5,9), CAM_TO, e);
    camera.lookAt(0,1.1,0); if(intro>=1) controls.enabled = true;
  } else controls.update();

  // idle power pulse / boot glow
  power.material.emissiveIntensity = booted ? 1.8 : 0.4 + Math.sin(now*0.004)*0.25;
  leds.forEach((m,i)=> m.emissiveIntensity = 0.4 + Math.abs(Math.sin(now*0.006 + i))*0.9);
  if(booted){ glow = Math.min(1, glow+0.02); }
  under.intensity = glow*1.4;
  // holographic projection: unfold vertically + flicker while powering up
  const flick = glow < 0.75 ? (0.45 + Math.abs(Math.sin(now*0.05))*0.55) : 1;
  panel.material.opacity = glow*0.96*flick;
  panel.scale.set(1, Math.max(0.02, 0.4 + glow*0.6), 1);
  beamMat.opacity = glow*0.12*flick;
  holo.position.y = Math.sin(now*0.001)*0.03;          // gentle float
  panel.rotation.z = Math.sin(now*0.0008)*0.006;        // holo sway
  if(flash>0) flash = Math.max(0, flash-0.045);

  // boot typewriter — reveal BOOT lines char-by-char
  if(!typing && typeQ.length){ typing = typeQ.shift(); typedN = 0;
    if(typing.t === ''){ history.push(typing); typing = null; } }
  if(typing){ typedN += 1.7;
    if(typedN >= typing.t.length){ history.push({ t:typing.t, c:typing.c }); typing = null; } }
  if(booted && !accepting && !typing && typeQ.length === 0) accepting = true;

  // particles rise
  const pa = particles.geometry.attributes.position;
  for(let i=0;i<PN;i++){ let y=pa.getY(i)+pspd[i]; if(y>6) y=0; pa.setY(i,y); }
  pa.needsUpdate = true;

  // mesh pulses travel toward the box
  if(mesh.visible) pulses.forEach(p=>{ const u=p.userData; u.t+=u.spd; if(u.t>1)u.t=0;
    p.position.lerpVectors(u.from, u.to, u.t); });
  mesh.rotation.y += 0.0009;

  drawScreen();
  composer.render();
}
tick();

addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight); });
</script>
